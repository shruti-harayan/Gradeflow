services:
  backend:
    build:
      context: ./backend
    container_name: gradeflow-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend1
    container_name: gradeflow-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: ${VITE_BACKEND_URL}
    depends_on:
      - backend
    restart: unless-stopped
