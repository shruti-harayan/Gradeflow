services:
  backend:
    build:
      context: ./backend
    container_name: gradeflow-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend1
    container_name: gradeflow-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend1/.env
    depends_on:
      - backend
    restart: unless-stopped
